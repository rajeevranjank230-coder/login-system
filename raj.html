   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="murari.css">
</head>
<body>

<div class="register-container">
  <form class="register-form">
    <h2>Create New Account</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Enter your first name">
      </div>

      <div class="form-group">
        <label>Middle Name</label>
        <input type="text" id="middleName" placeholder="Enter your middle name">
      </div>
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Enter your last name">
    </div>

    <div class="form-group">
      <label>Mobile Number</label>
      <div class="input-with-button">
        <input type="text" id="mobile" placeholder="Enter your mobile number">
        <button type="button" class="secondary-btn">Validate</button>
      </div>
    </div>

    <div class="form-group">
      <label>Email ID (Username)</label>
      <div class="input-with-button">
        <input type="email" id="email" placeholder="Enter your email id">
        <button type="button" class="secondary-btn">Validate</button>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="form-group">
      <label>Select Your Gender</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="Male"> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Other"> Other</label>
      </div>
    </div>

    <button type="submit" class="primary-btn">Submit</button>
  </form>
</div>

<!-- BACKEND CONNECTION SCRIPT -->
<script>
document.querySelector(".register-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const firstName = document.getElementById("firstName").value;
    const middleName = document.getElementById("middleName").value;
    const lastName = document.getElementById("lastName").value;
    const mobile = document.getElementById("mobile").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const gender = document.querySelector("input[name='gender']:checked")?.value;

    if (!email || !password) {
        alert("Email and Password are required ❌");
        return;
    }

    const response = await fetch("http://localhost:5000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email,
            password,
            firstName,
            middleName,
            lastName,
            mobile,
            gender
        })
    });

    const data = await response.json();
    alert(data.message);

    if (data.message.includes("Successfully")) {
        window.location.href = "index.html";
    }
});
</script>

</body>
</html>
